name: Compilar Executável Windows

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4  # Atualizado de v3 para v4

    - name: Configurar Python
      uses: actions/setup-python@v5 # Atualizado de v4 para v5
      with:
        python-version: '3.9'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Gerar Executável com PyInstaller
      run: |
        pyinstaller --noconsole --onefile gerador_relatorio.py

    - name: Upload do arquivo .exe
      uses: actions/upload-artifact@v4 # Já estava na v4
      with:
        name: RelatorioObras-Windows
        path: dist/gerador_relatorio.exe